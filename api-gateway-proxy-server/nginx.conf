events {}

http {

  # ── Round Robin Load Balancer (yêu cầu mở rộng 10) ──────────────────────
  upstream web_backends {
    server web-frontend-server:80;   # Server 1 – xanh dương
    server web-frontend-server2:80;  # Server 2 – đỏ
    # Nginx mặc định dùng Round Robin: request luân phiên giữa 2 server
  }

  server {
    listen 80;
    server_name _;

    # ── Web tĩnh → Round Robin 2 server ────────────────────────────────
    location / {
      proxy_pass         http://web_backends;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── App API (strip /api/) ──────────────────────────────────────────
    location /api/ {
      proxy_pass         http://application-backend-server:8081/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Keycloak Auth ──────────────────────────────────────────────────
    location /auth/ {
      proxy_pass         http://authentication-identity-server:8080/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /student/ route (yêu cầu mở rộng 9) ──────────────────────────
    location /student/ {
      proxy_pass         http://application-backend-server:8081/student;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static files từ app backend ────────────────────────────────────
    location /static/ {
      proxy_pass         http://application-backend-server:8081/static/;
      proxy_set_header   Host              $host;
    }
  }
}
